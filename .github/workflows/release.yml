name: release

# Build and publish the GPU image to GHCR. The build number bumps on every run
# (github.run_number), so the published semantic version is 0.1.<run_number>.
# Consumers (Cortex docker-compose) pin a specific 0.1.<n> tag, 0.1, or :latest.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # The image bakes the Whisper weights at build time, so it is large.
      # Reclaim preinstalled toolchains the runner doesn't need or the build can
      # run out of disk mid-way.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h

      - name: Compute version
        id: ver
        run: echo "version=$(python scripts/version.py --build ${{ github.run_number }})" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/whisper-stt
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=0.1
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
