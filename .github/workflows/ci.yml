name: ci

# GPU-free test run. Exercises the API + audio + engine contract via the
# EchoEngine path (no torch, no weights) so CI is fast and needs no GPU.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q
